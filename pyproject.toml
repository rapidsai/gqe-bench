[build-system]
requires = ["scikit-build-core>=0.3.3", "pybind11"]
build-backend = "scikit_build_core.build"

[project]
name = "gqe"
version = "0.0.1"
description = "GPU Query Executor (GQE)"
requires-python = ">=3.9"
dependencies = [
    "pynvml",
]

[tool.scikit-build]
cmake.source-dir = "."
cmake.verbose = true
