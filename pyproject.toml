[build-system]
requires = ["scikit-build-core>=0.3.3", "pybind11"]
build-backend = "scikit_build_core.build"

[project]
name = "gqe"
version = "0.0.1"
description = "GPU Query Executor (GQE)"
requires-python = ">=3.12"
dependencies = [
    "database-benchmarking-tools @ git+ssh://git@gitlab-master.nvidia.com:12051/Devtech-Compute/gqe-benchmarking.git@e4a24e0f",
    "pynvml",
    "pandas",
    "pyarrow",
    "nvtx",
]

[tool.scikit-build]
cmake.source-dir = "."
cmake.verbose = true
