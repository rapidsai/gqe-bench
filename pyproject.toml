[build-system]
requires = ["scikit-build-core>=0.3.3", "pybind11"]
build-backend = "scikit_build_core.build"

[project]
name = "gqe"
version = "0.0.1"
description = "GPU Query Executor (GQE)"
requires-python = ">=3.12"
dependencies = [
    "database-benchmarking-tools @ git+ssh://git@gitlab-master.nvidia.com:12051/Devtech-Compute/gqe-benchmarking.git@d154f8cb",
    "nvidia-ml-py",
    "pandas",
    "pyarrow",
    "nvtx",
]

[tool.scikit-build]
cmake.source-dir = "."
cmake.verbose = true
install.strip=false

[project.scripts]
gqe-tpch-parameter-sweep = "gqe.benchmark.run_tpch_parameter_sweep:main"
gqe-tpch-pretuned = "gqe.benchmark.run_tpch_pretuned:main"